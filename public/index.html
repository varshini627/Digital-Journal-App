<!DOCTYPE html>

<html>

<head>

<title>Digital Journal App</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>My Digital Journal ✍️</h1>


<input 
id="title"
placeholder="Journal Title">



<textarea

id="content"

placeholder="Write your thoughts">

</textarea>



<input

id="mood"

placeholder="Mood 😊">



<button onclick="addJournal()">

Save Journal

</button>



<h2>My Entries</h2>



<input

id="search"

placeholder="Search journal"

onkeyup="searchJournals()">



<div id="journals"></div>



<script src="script.js"></script>


</body>


</html>
